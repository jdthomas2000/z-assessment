services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: template
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    command: >
      sh -c " sleep 5 && npx knex migrate:rollback --knexfile db/knexfile.js &&
             npx knex migrate:latest --knexfile db/knexfile.js &&
             npx knex seed:run --knexfile db/knexfile.js &&
             npm run dev"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/template
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules 
    restart: 
      on-failure

  frontend:
    build: ./frontend/app 
    ports:  
      - "5173:5173"
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    volumes:
      - ./frontend/app:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true